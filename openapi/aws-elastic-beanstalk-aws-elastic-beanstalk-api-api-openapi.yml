openapi: 3.1.0
info:
  title: AWS Elastic Beanstalk AWS Elastic Beanstalk API API
  version: '2010-12-01'
  description: 'AWS Elastic Beanstalk is a Platform-as-a-Service offering for deploying

    and scaling web applications and services. The Elastic Beanstalk Query

    API accepts POST requests to the root path with the Action and Version

    specified as parameters and the operation input in the

    application/x-www-form-urlencoded request body. All requests are signed

    with AWS Signature Version 4 (SigV4).


    See https://docs.aws.amazon.com/elasticbeanstalk/latest/api/Welcome.html

    '
servers:
- url: https://elasticbeanstalk.{region}.amazonaws.com
  description: AWS Elastic Beanstalk regional endpoint
  variables:
    region:
      default: us-east-1
security:
- SigV4: []
tags:
- name: AWS Elastic Beanstalk API
paths:
  /:
    post:
      summary: AWS Elastic Beanstalk Query API entry point
      description: 'All Elastic Beanstalk operations are POST requests to the root path

        with the Action and Version specified as parameters and operation

        input in the application/x-www-form-urlencoded request body.

        '
      operationId: invokeAction
      parameters:
      - name: Action
        in: query
        required: true
        schema:
          type: string
          enum:
          - CreateApplication
          - UpdateApplication
          - DeleteApplication
          - DescribeApplications
          - UpdateApplicationResourceLifecycle
          - CreateApplicationVersion
          - UpdateApplicationVersion
          - DeleteApplicationVersion
          - DescribeApplicationVersions
          - CreateEnvironment
          - UpdateEnvironment
          - TerminateEnvironment
          - RebuildEnvironment
          - RestartAppServer
          - DescribeEnvironments
          - DescribeEnvironmentHealth
          - DescribeEnvironmentResources
          - DescribeInstancesHealth
          - DescribeEnvironmentManagedActions
          - DescribeEnvironmentManagedActionHistory
          - ApplyEnvironmentManagedAction
          - AbortEnvironmentUpdate
          - SwapEnvironmentCNAMEs
          - ComposeEnvironments
          - AssociateEnvironmentOperationsRole
          - DisassociateEnvironmentOperationsRole
          - CreateConfigurationTemplate
          - UpdateConfigurationTemplate
          - DeleteConfigurationTemplate
          - DescribeConfigurationOptions
          - DescribeConfigurationSettings
          - ValidateConfigurationSettings
          - DeleteEnvironmentConfiguration
          - CreatePlatformVersion
          - DeletePlatformVersion
          - DescribePlatformVersion
          - ListPlatformVersions
          - ListPlatformBranches
          - ListAvailableSolutionStacks
          - DescribeEvents
          - RequestEnvironmentInfo
          - RetrieveEnvironmentInfo
          - CheckDNSAvailability
          - CreateStorageLocation
          - DescribeAccountAttributes
          - ListTagsForResource
          - UpdateTagsForResource
      - name: Version
        in: query
        required: true
        schema:
          type: string
          default: '2010-12-01'
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Successful response (XML)
          content:
            text/xml:
              schema:
                type: object
        '400':
          description: Client error
        '500':
          description: Server error
      tags:
      - AWS Elastic Beanstalk API
components:
  securitySchemes:
    SigV4:
      type: apiKey
      in: header
      name: Authorization
      description: AWS Signature Version 4 signed Authorization header
